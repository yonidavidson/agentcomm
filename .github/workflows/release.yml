name: release

# Ships each GitHub Release to both distribution channels:
#
#   1. npm registry (canonical) — `npm publish` via npm trusted publishing
#      (OIDC; no token secret). Install/upgrade: `npm install -g @yonidavidson/agentcomm@latest`.
#      Other systems embed the SDK with a plain `npm install @yonidavidson/agentcomm`.
#   2. Release tarballs (fallback) — agentcomm-X.Y.Z.tgz plus the
#      constant-named agentcomm-latest.tgz, so
#      releases/latest/download/agentcomm-latest.tgz stays an always-newest
#      install URL for registry-less environments.
#
# Why a tarball fallback and not a `github:` spec: installers that git-clone
# the whole repo choke on this monorepo (full CLI + committed dist/ across
# its history). An `npm pack` tarball is ~100 kB (dist only, no history) and
# installs in seconds from a URL.
#
# No secrets: tarball uploads use the built-in GITHUB_TOKEN; npm publish uses
# OIDC trusted publishing (configure this repo+workflow as the trusted
# publisher for the `agentcomm` package on npmjs.com — one-time setup).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to attach the tarball to (e.g. v0.16.9)'
        required: true

permissions:
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC) — no token secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1 (node 22 bundles npm 10).
      - run: npm install -g npm@latest

      - run: npm ci

      - name: Publish to the npm registry (skip if this version is already up)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@yonidavidson/agentcomm@${VERSION}" version >/dev/null 2>&1; then
            echo "::notice::agentcomm@${VERSION} already on the registry — skipping publish (re-run of the tarball attach?)"
            exit 0
          fi
          # prepublishOnly runs the build; provenance links the publish to this workflow run.
          npm publish --provenance
          echo "::notice::Published agentcomm@${VERSION} to the npm registry"

  attach-install-tarball:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Pack the install tarball
        id: pack
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # `npm pack` emits yonidavidson-agentcomm-<version>.tgz for the
          # scoped name (dist-only, per package.json "files"); take the
          # filename from npm itself, then keep the historical asset names —
          # README documents …/download/vX.Y.Z/agentcomm-X.Y.Z.tgz.
          PACKED=$(npm pack --silent | tail -1)
          CLI="agentcomm-${VERSION}.tgz"
          cp "$PACKED" "$CLI"
          # Constant-named copy: GitHub's releases/latest/download/<asset>
          # redirect makes …/releases/latest/download/agentcomm-latest.tgz a
          # stable always-newest URL for scripts and automations.
          cp "$PACKED" agentcomm-latest.tgz
          echo "cli=$CLI" >> "$GITHUB_OUTPUT"
          echo "Packed $CLI ($(du -h "$CLI" | cut -f1))"

      - name: Upload tarballs to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          gh release upload "$TAG" "${{ steps.pack.outputs.cli }}" agentcomm-latest.tgz --clobber --repo "$GITHUB_REPOSITORY"
          echo "::notice::Attached ${{ steps.pack.outputs.cli }} + agentcomm-latest.tgz to $TAG"
