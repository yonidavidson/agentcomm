name: release

# Attaches the install artifact to each GitHub Release:
#
#   agentcomm-X.Y.Z.tgz — THE distribution. Every harness installs the CLI
#   with `npm install -g <this URL>` (package.json's `bin` provides the
#   global `agentcomm`), then wires hooks via `agentcomm hooks --harness …`
#   (or lets a bus command auto-provision them on connect).
#
# Why a tarball and not a `github:` spec: installers that git-clone the whole
# repo choke on this monorepo (full CLI + committed dist/ across its history).
# An `npm pack` tarball is ~100 kB (dist only, no history) and installs in
# seconds from a URL.
#
# No secrets: uploads use the built-in GITHUB_TOKEN. The npm registry is not
# involved — the GitHub release artifact IS the distribution.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to attach the tarball to (e.g. v0.16.9)'
        required: true

permissions:
  contents: write

jobs:
  attach-install-tarball:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Pack the install tarball
        id: pack
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # `npm pack` emits agentcomm-<version>.tgz (dist-only, per package.json "files").
          npm pack
          CLI="agentcomm-${VERSION}.tgz"
          echo "cli=$CLI" >> "$GITHUB_OUTPUT"
          echo "Packed $CLI ($(du -h "$CLI" | cut -f1))"

      - name: Upload tarball to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          gh release upload "$TAG" "${{ steps.pack.outputs.cli }}" --clobber --repo "$GITHUB_REPOSITORY"
          echo "::notice::Attached ${{ steps.pack.outputs.cli }} to $TAG"
