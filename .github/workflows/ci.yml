name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # contents: write lets the github:// backend e2e suite exercise a scratch
    # branch of this very repo with the workflow token (fork PRs get a
    # read-only token and the suite self-skips).
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      # Live services for the e2e suites: Garage (S3, Rust), fake-gcs-server
      # (GCS) and Postgres. The suites self-skip without them — starting the
      # stack is what makes CI actually exercise all five backends.
      - name: Start e2e services
        run: npm run test:e2e:up

      - name: Test (all backends)
        run: npm test
        env:
          AGENTCOMM_TEST_GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop e2e services
        if: always()
        run: npm run test:e2e:down

  # Drives the REAL harness binaries (OpenCode; Pi to follow) with the plugin
  # loaded, against a file:// bus + a local mock model — regression coverage for
  # the actual integration, not just the in-process module tests. Separate job:
  # installing the binaries is slow and needs no docker backend stack. The
  # suites self-skip without their binary/flag, so a broken install degrades to
  # "skipped", never a red build.
  e2e-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Install OpenCode
        run: npm i -g opencode-ai && opencode --version

      - name: Harness e2e (real binaries)
        run: npm run test:e2e:harness
        env:
          AGENTCOMM_TEST_OPENCODE: '1'
